# fly.toml — METU on Fly.io (Singapore region)
#
# Pairs with the repo-root Dockerfile. App name + URL get assigned the
# first time `fly launch` runs; rename via `fly apps rename` if needed.

app = "metu"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

# ─────────────────────────────────────────────────────────────────────────────
# HTTP service — Fly's edge terminates HTTPS and forwards to the container.
# Internal port matches what Fly's launch wizard set (8080) — easier than
# overriding the live config from the dashboard.
# ─────────────────────────────────────────────────────────────────────────────
[http_service]
  internal_port = 8080
  force_https = true
  # Keep the machine running 24/7 — Neon already cold-starts on its own;
  # we don't want Fly to add another scale-to-zero pause on top.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

# ─────────────────────────────────────────────────────────────────────────────
# VM size — 512 MB stays under the Fly free credit ($5/mo) at ~$3.88/mo
# per shared-cpu-1x machine. 1 GB (~$5.70/mo) goes slightly over and
# starts charging out of pocket, so we keep this lean. Bump back to
# "1gb" only if you start seeing OOM kills under real load.
# ─────────────────────────────────────────────────────────────────────────────
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# ─────────────────────────────────────────────────────────────────────────────
# Release phase — runs once per deploy in a temporary VM with the same
# image + secrets, before the new release goes live. We use it to apply
# pending Prisma migrations against the *direct* (unpooled) Neon URL,
# because pgbouncer on the pooled endpoint blocks features Migrate
# needs (advisory locks, prepared statements).
# ─────────────────────────────────────────────────────────────────────────────
[deploy]
  # Invoke Prisma's CLI entry directly (`node node_modules/prisma/build/index.js`)
  # rather than via `node_modules/.bin/prisma` — the .bin/ symlink directory
  # isn't included in our slim runner image, only the actual prisma package.
  release_command = "sh -c 'DATABASE_URL=\"$DATABASE_URL_UNPOOLED\" node node_modules/prisma/build/index.js migrate deploy --schema=packages/db/prisma/schema.prisma'"
