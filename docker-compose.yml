services:
  db:
    image: postgres:16-alpine
    container_name: metu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metu
      POSTGRES_PASSWORD: metu
      POSTGRES_DB: metu
    ports:
      - "5432:5432"
    volumes:
      - metu-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metu -d metu"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4.8.1-standalone
    container_name: metu-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      db:
        condition: service_healthy

volumes:
  metu-db-data:
